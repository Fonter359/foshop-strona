<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FO SHOP - Oficjalny Sklep</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0914;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .shop-container {
            background: linear-gradient(135deg, #161224 0%, #0f0c1b 100%);
            border: 2px solid #3d2b7a;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #b096ff;
            text-shadow: 0 0 10px rgba(176, 150, 255, 0.3);
            margin-bottom: 5px;
        }

        .header p {
            color: #796aab;
            font-size: 0.95rem;
        }

        .section-title {
            font-size: 1.1rem;
            color: #8c76e2;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 1px solid #2d2254;
            padding-bottom: 5px;
        }

        .product-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .product-item {
            background-color: #1c1730;
            border: 1px solid #2d234f;
            border-radius: 10px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .product-item:hover {
            transform: translateX(4px);
            border-color: #563fa1;
        }

        .product-name {
            font-weight: 600;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge-perm {
            background-color: #563fa1;
            color: #ffffff;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .product-price {
            background-color: #6c52ca;
            color: #ffffff;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            display: inline-block;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .product-price:hover {
            background-color: #8269e6;
            box-shadow: 0 0 12px rgba(108, 82, 202, 0.5);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #514675;
        }
    </style>
</head>
<body>

    <div class="shop-container">
        <div class="header">
            <h1>FO SHOP</h1>
            <p>Najlepsze produkty Blox Fruits & Roblox</p>
        </div>

        <div class="section-title">Owoce (Permanent)</div>
        
        <div class="product-list">
            <!-- Tutaj podpięliśmy Twój nowy produkt z SellApp -->
            <div class="product-item">
                <span class="product-name">DRAGON <span class="badge-perm">PERM</span></span>
                <a href="https://foshop.sell.app/product/dragon-perm" target="_blank" class="product-price">135 PLN</a>
            </div>
        </div>

        <div class="footer">
            &copy; 2026 FO SHOP. Wszystkie prawa zastrzeżone.
        </div>
    </div>

</body>
</html>
